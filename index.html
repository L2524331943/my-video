<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>VISION 视界 · 沉浸播放器</title>
  <!-- 现代字体与平滑渲染 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* 避免拖动时误选文字，保留视频文字体验 */
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0f1a, #030609);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      padding: 1.5rem;
      position: relative;
    }

    /* 精致光晕背景装饰 */
    body::before {
      content: '';
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: radial-gradient(ellipse at 70% 40%, rgba(0, 180, 216, 0.08), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* 主容器——磨砂玻璃质感卡片 */
    .player-card {
      max-width: 1100px;
      width: 100%;
      background: rgba(12, 18, 28, 0.65);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1.2rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 200, 220, 0.15);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .player-card:hover {
      box-shadow: 0 30px 55px -15px rgba(0, 0, 0, 0.7), 0 0 0 1.5px rgba(0, 210, 230, 0.3);
    }

    /* 视频容器：保持16:9，圆角深邃 */
    .video-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 */
      background: #000000;
      border-radius: 1.2rem;
      overflow: hidden;
      isolation: isolate;
      box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.5);
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #03060c;
      cursor: pointer;
      transition: filter 0.2s;
    }

    /* 自定义中央大播放按钮 (仅在暂停时优雅显示) */
    .big-play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      background: rgba(0, 200, 220, 0.9);
      backdrop-filter: blur(8px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.2s;
      z-index: 10;
      box-shadow: 0 6px 18px rgba(0, 200, 230, 0.4);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .big-play-btn svg {
      width: 34px;
      height: 34px;
      fill: #ffffff;
      margin-left: 4px;
    }

    .big-play-btn:hover {
      background: #00d4ff;
      transform: translate(-50%, -50%) scale(1.05);
      box-shadow: 0 10px 24px rgba(0, 200, 255, 0.6);
    }

    .video-wrapper.paused .big-play-btn {
      opacity: 1;
    }

    /* 底部控件栏 —— 专业玻璃面板 */
    .controls-bar {
      margin-top: 1rem;
      background: rgba(18, 24, 34, 0.7);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      padding: 0.7rem 1.2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      border: 1px solid rgba(0, 210, 230, 0.2);
      transition: all 0.2s;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    /* 控件按钮通用样式 */
    .ctrl-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      width: 36px;
      height: 36px;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      color: #eef5ff;
      font-size: 1.2rem;
    }

    .ctrl-btn svg {
      width: 20px;
      height: 20px;
      fill: #eef5ff;
      stroke: none;
    }

    .ctrl-btn:hover {
      background: rgba(0, 200, 220, 0.2);
      transform: scale(1.04);
    }

    .ctrl-btn:active {
      transform: scale(0.96);
    }

    /* 时间显示 */
    .time-display {
      font-size: 0.85rem;
      font-weight: 500;
      background: rgba(0,0,0,0.4);
      padding: 5px 12px;
      border-radius: 40px;
      letter-spacing: 0.5px;
      font-feature-settings: 'tnum';
      color: #ccf4ff;
      backdrop-filter: blur(4px);
    }

    /* 进度条容器 */
    .progress-container {
      flex: 2;
      min-width: 140px;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .progress-bar {
      flex: 1;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      cursor: pointer;
      position: relative;
      transition: height 0.1s;
    }

    .progress-bar:hover {
      height: 6px;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00c8d6, #2a9df4);
      border-radius: 10px;
      position: relative;
      transition: width 0.05s linear;
      box-shadow: 0 0 4px #00c8d6;
    }

    .progress-buffered {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      width: 0%;
      pointer-events: none;
    }

    /* 倍速下拉菜单 (优雅设计) */
    .speed-dropdown {
      position: relative;
    }

    .speed-btn {
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
      border-radius: 2rem;
      padding: 6px 14px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #e0f2fe;
      border: 1px solid rgba(0, 210, 230, 0.4);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .speed-btn:hover {
      background: rgba(0, 180, 200, 0.4);
      border-color: #00e0ff;
    }

    .speed-menu {
      position: absolute;
      bottom: 45px;
      right: 0;
      background: rgba(20, 28, 38, 0.96);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 0.5rem 0;
      min-width: 100px;
      border: 1px solid rgba(0, 210, 240, 0.3);
      opacity: 0;
      visibility: hidden;
      transform: translateY(8px);
      transition: 0.2s;
      z-index: 20;
      box-shadow: 0 12px 28px -8px black;
    }

    .speed-menu.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .speed-option {
      padding: 8px 20px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.1s;
      color: #f0f6fc;
      text-align: center;
    }

    .speed-option:hover {
      background: rgba(0, 200, 220, 0.3);
    }

    .speed-option.active {
      background: #00acc0;
      color: #011;
      font-weight: 600;
    }

    /* 加载指示器 */
    .loading-spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top: 3px solid #00e0ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      opacity: 0;
      visibility: hidden;
      transition: 0.2s;
      z-index: 15;
    }

    .video-wrapper.loading .loading-spinner {
      opacity: 1;
      visibility: visible;
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* 响应式 */
    @media (max-width: 640px) {
      .player-card {
        padding: 0.8rem;
      }
      .controls-bar {
        padding: 0.5rem 0.9rem;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .ctrl-btn {
        width: 32px;
        height: 32px;
      }
      .time-display {
        font-size: 0.7rem;
      }
      .speed-btn {
        padding: 4px 10px;
        font-size: 0.7rem;
      }
      .big-play-btn {
        width: 64px;
        height: 64px;
      }
    }

    /* 画中画 & 全屏视觉适配 */
    :-webkit-full-screen video {
      object-fit: contain;
    }
    :fullscreen .controls-bar {
      background: rgba(12, 18, 24, 0.85);
    }

    /* 隐藏原生控件 */
    video::-webkit-media-controls {
      display: none !important;
    }
    video {
      pointer-events: auto;
    }
  </style>
</head>
<body>
<div class="player-card">
  <div class="video-wrapper" id="videoWrapper">
    <video id="visionPlayer" playsinline webkit-playsinline preload="metadata" poster="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 450'%3E%3Crect width='800' height='450' fill='%23050a12'/%3E%3Ctext x='50%25' y='50%25' fill='%2300b4d8' text-anchor='middle' font-family='monospace' font-size='22'%3EVISION MEDIA%3C/text%3E%3C/svg%3E">
      <source src="test%E8%A7%86%E9%A2%91.mp4" type="video/mp4">
      您的浏览器不支持视频播放。
    </video>
    <div class="big-play-btn" id="bigPlayBtn">
      <svg viewBox="0 0 24 24" width="34" height="34">
        <path d="M8 5v14l11-7z" fill="white"/>
      </svg>
    </div>
    <div class="loading-spinner"></div>
  </div>

  <!-- 自定义控制栏 -->
  <div class="controls-bar">
    <div class="control-group">
      <button class="ctrl-btn" id="playPauseBtn">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" id="pauseIcon" fill="currentColor"/>
          <path d="M8 5v14l11-7z" id="playIcon" fill="currentColor" style="display: none;"/>
        </svg>
      </button>
      <div class="time-display">
        <span id="currentTime">0:00</span> / <span id="durationTime">0:00</span>
      </div>
    </div>

    <div class="progress-container">
      <div class="progress-bar" id="progressBar">
        <div class="progress-buffered" id="bufferedBar"></div>
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="control-group">
      <div class="speed-dropdown">
        <button class="speed-btn" id="speedToggleBtn">1.0x <span>▼</span></button>
        <div class="speed-menu" id="speedMenu">
          <div class="speed-option" data-speed="0.5">0.5x</div>
          <div class="speed-option" data-speed="0.75">0.75x</div>
          <div class="speed-option active" data-speed="1">1.0x</div>
          <div class="speed-option" data-speed="1.25">1.25x</div>
          <div class="speed-option" data-speed="1.5">1.5x</div>
          <div class="speed-option" data-speed="2">2.0x</div>
        </div>
      </div>
      <button class="ctrl-btn" id="pipBtn" title="画中画">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M19 7h-8v6h8V7zm2-4H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM9 12h7v-3H9v3z"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="fullscreenBtn" title="全屏">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
  (function() {
    const video = document.getElementById('visionPlayer');
    const wrapper = document.getElementById('videoWrapper');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const playIconSvg = document.getElementById('playIcon');
    const pauseIconSvg = document.getElementById('pauseIcon');
    const bigPlayBtn = document.getElementById('bigPlayBtn');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const bufferedBar = document.getElementById('bufferedBar');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationTimeSpan = document.getElementById('durationTime');
    const speedToggleBtn = document.getElementById('speedToggleBtn');
    const speedMenu = document.getElementById('speedMenu');
    const pipBtn = document.getElementById('pipBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');

    let isDragging = false;
    let currentSpeed = 1;

    // 辅助函数：时间格式化 mm:ss
    function formatTime(seconds) {
      if (isNaN(seconds)) return '0:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs < 10 ? '0' + secs : secs}`;
    }

    // 更新播放/暂停按钮UI
    function updatePlayPauseUI() {
      const isPlaying = !video.paused;
      if (isPlaying) {
        playIconSvg.style.display = 'none';
        pauseIconSvg.style.display = 'block';
        wrapper.classList.remove('paused');
      } else {
        playIconSvg.style.display = 'block';
        pauseIconSvg.style.display = 'none';
        wrapper.classList.add('paused');
      }
    }

    // 切换播放/暂停
    function togglePlay() {
      if (video.paused) {
        video.play();
      } else {
        video.pause();
      }
      updatePlayPauseUI();
    }

    // 更新进度条和缓冲
    function updateProgress() {
      if (!isDragging) {
        const percent = (video.currentTime / video.duration) * 100;
        progressFill.style.width = `${percent}%`;
      }
      currentTimeSpan.textContent = formatTime(video.currentTime);
      // 缓冲进度
      if (video.buffered.length > 0) {
        let bufferedEnd = video.buffered.end(video.buffered.length - 1);
        let bufferedPercent = (bufferedEnd / video.duration) * 100;
        bufferedBar.style.width = `${bufferedPercent}%`;
      }
    }

    // 设置视频总时长
    function setDuration() {
      durationTimeSpan.textContent = formatTime(video.duration);
    }

    // 跳转进度 (基于点击/拖拽)
    function seek(e) {
      const rect = progressBar.getBoundingClientRect();
      let clickX = e.clientX - rect.left;
      let width = rect.width;
      let percent = Math.min(1, Math.max(0, clickX / width));
      video.currentTime = percent * video.duration;
      progressFill.style.width = `${percent * 100}%`;
      isDragging = false;
    }

    function handleMouseMove(e) {
      if (!isDragging) return;
      const rect = progressBar.getBoundingClientRect();
      let clickX = e.clientX - rect.left;
      let width = rect.width;
      let percent = Math.min(1, Math.max(0, clickX / width));
      progressFill.style.width = `${percent * 100}%`;
    }

    function startDrag(e) {
      isDragging = true;
      seek(e);
      window.addEventListener('mousemove', handleMouseMove);
      window.addEventListener('mouseup', stopDrag);
    }

    function stopDrag(e) {
      if (isDragging) {
        seek(e);
        isDragging = false;
      }
      window.removeEventListener('mousemove', handleMouseMove);
      window.removeEventListener('mouseup', stopDrag);
    }

    progressBar.addEventListener('mousedown', startDrag);
    // 触摸屏支持
    progressBar.addEventListener('touchstart', (e) => {
      e.preventDefault();
      isDragging = true;
      const rect = progressBar.getBoundingClientRect();
      let touchX = e.touches[0].clientX - rect.left;
      let percent = Math.min(1, Math.max(0, touchX / rect.width));
      video.currentTime = percent * video.duration;
      progressFill.style.width = `${percent * 100}%`;
    });
    window.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      const rect = progressBar.getBoundingClientRect();
      let touchX = e.touches[0].clientX - rect.left;
      let percent = Math.min(1, Math.max(0, touchX / rect.width));
      progressFill.style.width = `${percent * 100}%`;
      video.currentTime = percent * video.duration;
    });
    window.addEventListener('touchend', () => {
      isDragging = false;
    });

    // 倍速菜单逻辑
    speedToggleBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      speedMenu.classList.toggle('show');
    });
    document.addEventListener('click', () => {
      speedMenu.classList.remove('show');
    });
    const speedOptions = document.querySelectorAll('.speed-option');
    speedOptions.forEach(opt => {
      opt.addEventListener('click', (e) => {
        e.stopPropagation();
        const newSpeed = parseFloat(opt.dataset.speed);
        if (!isNaN(newSpeed)) {
          video.playbackRate = newSpeed;
          currentSpeed = newSpeed;
          speedToggleBtn.innerHTML = `${newSpeed}x <span>▼</span>`;
          speedOptions.forEach(o => o.classList.remove('active'));
          opt.classList.add('active');
        }
        speedMenu.classList.remove('show');
      });
    });

    // 画中画功能
    if (document.pictureInPictureEnabled) {
      pipBtn.addEventListener('click', async () => {
        try {
          if (document.pictureInPictureElement) {
            await document.exitPictureInPicture();
          } else {
            await video.requestPictureInPicture();
          }
        } catch (err) {
          console.warn('画中画不支持或出错');
        }
      });
      video.addEventListener('enterpictureinpicture', () => {
        pipBtn.style.background = 'rgba(0, 200, 220, 0.5)';
      });
      video.addEventListener('leavepictureinpicture', () => {
        pipBtn.style.background = 'transparent';
      });
    } else {
      pipBtn.style.opacity = '0.5';
      pipBtn.style.pointerEvents = 'none';
      pipBtn.title = '当前浏览器不支持画中画';
    }

    // 全屏
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        const container = document.querySelector('.player-card');
        container.requestFullscreen().catch(err => console.warn(err));
      } else {
        document.exitFullscreen();
      }
    }
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    document.addEventListener('fullscreenchange', () => {
      if (document.fullscreenElement) {
        fullscreenBtn.style.background = 'rgba(0,200,220,0.3)';
      } else {
        fullscreenBtn.style.background = 'transparent';
      }
    });

    // 加载/播放事件，显示隐藏加载动画
    video.addEventListener('waiting', () => {
      wrapper.classList.add('loading');
    });
    video.addEventListener('playing', () => {
      wrapper.classList.remove('loading');
    });
    video.addEventListener('canplay', () => {
      wrapper.classList.remove('loading');
    });
    // 首次加载完成后更新总时长
    video.addEventListener('loadedmetadata', () => {
      setDuration();
      updateProgress();
    });
    video.addEventListener('timeupdate', updateProgress);
    video.addEventListener('progress', updateProgress);
    video.addEventListener('play', () => {
      updatePlayPauseUI();
      wrapper.classList.remove('paused');
    });
    video.addEventListener('pause', () => {
      updatePlayPauseUI();
      wrapper.classList.add('paused');
    });
    // 点击视频切换播放
    video.addEventListener('click', togglePlay);
    bigPlayBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      togglePlay();
    });
    playPauseBtn.addEventListener('click', togglePlay);

    // 初始化UI状态
    updatePlayPauseUI();
    // 如果视频无法自动播放，显示暂停样式
    video.addEventListener('loadstart', () => {
      if (video.paused) wrapper.classList.add('paused');
    });
    // 尝试自动静音播放？为了体验，不强制自动播放，保留用户交互
    // 兜底设置
    video.controls = false;  // 确保原生控件隐藏
  })();
</script>
</body>
</html>
