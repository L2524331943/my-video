<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>高清视频播放器</title>
  <!-- 关键：移动端必须添加 viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }
    /* 响应式容器：维持16:9比例 */
    .video-container {
      width: 100%;
      max-width: 800px;
      position: relative;
      padding-top: 56.25%; /* 16:9 黄金比例 */
    }
    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 8px;
      background: #121212;
    }
    /* 美化控件（关键优化） */
    video::-webkit-media-controls {
      background: rgba(18, 18, 18, 0.85) !important;
    }
    video::-webkit-media-controls-play-button,
    video::-webkit-media-controls-mute-button,
    video::-webkit-media-controls-fullscreen-button,
    video::-webkit-media-controls-picture-in-picture-button {
      background-color: #1e88e5 !important;
      border-radius: 50% !important;
      padding: 5px !important;
    }
    /* 进度条优化 */
    video::-webkit-media-controls-timeline {
      height: 6px !important;
      background: #333 !important;
    }
    video::-webkit-media-controls-playback-rate-button {
      display: none; /* 移除默认倍速按钮（用JS实现更友好） */
    }
  </style>
</head>
<body>
  <div class="video-container">
    <!-- 关键属性：画中画 + 移动端内联播放 -->
    <video 
      controls 
      playsinline 
      webkit-playsinline 
      controlsList="picture-in-picture" 
      disablePictureInPicture="false"
      poster="https://via.placeholder.com/800x450/121212/FFFFFF?text=Loading+Video..."
    >
      <source src="test%E8%A7%86%E9%A2%91.mp4" type="video/mp4">
      您的浏览器不支持视频播放
    </video>
  </div>

  <!-- 增强功能：画中画 & 倍速控制 -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const video = document.querySelector('video');
      
      // 1. 修复移动端自动全屏问题
      video.addEventListener('click', (e) => {
        if (window.innerWidth <= 768 && video.paused) {
          video.play();
          e.stopPropagation(); // 阻止默认全屏行为
        }
      });
      
      // 2. 添加画中画按钮（兼容性增强）
      if (document.pictureInPictureEnabled) {
        video.addEventListener('loadedmetadata', () => {
          video.controlsList.add('picture-in-picture');
        });
      }
      
      // 3. 添加倍速选择器（更友好体验）
      const playbackRates = [0.5, 0.75, 1, 1.25, 1.5, 2];
      const rateBtn = document.createElement('button');
      rateBtn.innerHTML = '1x';
      rateBtn.style.cssText = `
        position: absolute; 
        bottom: 45px; 
        right: 15px; 
        background: rgba(0,0,0,0.5); 
        color: white; 
        border: none; 
        border-radius: 4px;
        padding: 3px 8px;
        font-size: 12px;
        z-index: 10;
        cursor: pointer;
      `;
      
      // 倍速切换逻辑
      let currentRate = 0;
      rateBtn.addEventListener('click', () => {
        currentRate = (currentRate + 1) % playbackRates.length;
        video.playbackRate = playbackRates[currentRate];
        rateBtn.textContent = `${playbackRates[currentRate]}x`;
      });
      
      // 插入到播放器
      document.querySelector('.video-container').appendChild(rateBtn);
    });
  </script>
</body>
</html>
